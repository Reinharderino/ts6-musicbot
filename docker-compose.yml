services:
  ts6-musicbot:
    build: .
    container_name: ts6-musicbot
    restart: unless-stopped
    # network_mode: host  # Uncomment when bot and TS server run on the same machine (self-hosted)
    #                     # Comment out when connecting to a remote TS server

    env_file: .env
    environment:
      - AUDIOBOT_URL=http://localhost:58913

    volumes:
      - audio_cache:/tmp/musicbot_cache

    healthcheck:
      test: ["CMD", "python3", "bot/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  audio_cache:
