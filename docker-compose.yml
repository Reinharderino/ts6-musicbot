services:
  ts6-musicbot:
    build: .
    container_name: ts6-musicbot
    restart: unless-stopped
    # network_mode: host  # Uncomment only when bot runs on the same machine as the TS server

    env_file: .env

    volumes:
      - audio_cache:/tmp/musicbot_cache

    healthcheck:
      test: ["CMD", "python3", "bot/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  audio_cache:
